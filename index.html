<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="greeting">
      <section class="panel">
        <p class="eyebrow">Simple starter app</p>
        <h1 id="greeting">Hello, world!</h1>
        <p class="message">
          Your first page is running. Small, bright, and ready for whatever comes next.
        </p>
        <button id="greetButton" type="button">Say hello</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
